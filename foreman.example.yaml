# Foreman sample configuration
# Place this file at your project root as foreman.yaml

project_root: .
password: admin
port: 9090
host: 127.0.0.1
log_retention_lines: 5000

# Import additional config files (commands, services, etc.)
# imports:
#   - db-commands.yaml
#   - quality-commands.yaml

# Reusable command definitions
commands:
  install:
    label: "Install Dependencies"
    description: "Install all project dependencies"
    group: setup
    tags: [deps, install]
    run: "npm install"
    timeout: "2m"

  build:
    label: "Build"
    description: "Build the project"
    group: build
    tags: [build]
    run: "echo 'Build step would run here'"
    depends_on: [install]

  lint:
    label: "Lint"
    description: "Run linters"
    group: quality
    tags: [lint, ci]
    run: "echo 'Linting...'"
    ignore_errors: true

  test:
    label: "Test"
    description: "Run test suite"
    group: quality
    tags: [test, ci]
    run: "echo 'Running tests...'"
    timeout: "5m"

services:
  echo-test:
    label: "Echo Test Service"
    group: test
    command: bash
    args: ["-c", "while true; do echo \"$(date): hello from echo-test\"; sleep 2; done"]
    url: "http://localhost:3000"
    auto_start: false

  date-logger:
    label: "Date Logger"
    group: test
    command: bash
    args: ["-c", "for i in $(seq 1 100); do echo \"Log line $i at $(date)\"; sleep 1; done"]
    auto_start: false
    build:
      command: echo
      args: ["build step would run here"]

  # Example: service referencing a command via 'uses'
  # api:
  #   label: "API Server"
  #   uses: run-api              # references a command definition
  #   auto_start: true
  #   env:
  #     PORT: "8080"
  #   build:
  #     uses: build              # build step can also reference a command

